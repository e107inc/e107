---
# CI test configuration for the WebDriver suite.
#
# In the WebDriver workflow, two containers share a user-defined Podman
# network ('e107-webdriver'):
#   - 'target'   : the e107 app container provisioned by SaltStack
#   - 'selenium' : selenium/standalone-chrome
#
# Codeception runs inside 'target' via `docker exec`. The Selenium browser
# runs inside 'selenium' and drives the e107 admin UI served by 'target'.
# Therefore:
#   - The site URL must be reachable from inside 'selenium', so it uses the
#     target container's network alias ('target'), not 'localhost'.
#   - The Selenium endpoint must be reachable from inside 'target', so it
#     uses the selenium container's network alias ('selenium').
#   - The database is on 'target' itself; codecept inside 'target' reaches
#     it on '127.0.0.1'.
deployer: 'sftp'
url: 'http://target/e107/'
db:
  host: '127.0.0.1'
  dbname: 'app'
  user: 'app'
  password: 'Database Password for Continuous Integration'
  populate: true
selenium:
  host: 'selenium'
  port: '4444'
fs:
  host: 'localhost'
  user: 'www-data'
  port: '22'
  password: 'UNIX Password for Continuous Integration'
  path: '/var/www/html/e107/'
