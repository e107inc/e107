# e107 test harness compose stack: db + web. Driven by the
# e107_tests/bin/e107-tests wrapper, which sets the project name, the matrix
# env vars, and the bind mount; see e107_tests/docker/README.md. Don't run
# `docker compose` against this file directly.

name: ${COMPOSE_PROJECT_NAME:?no active env; drive this file via e107_tests/bin/e107-tests (see docker/README.md)}

# Every container and volume carries these labels. They are the harness's
# only state store: e107-tests rediscovers envs (any worktree) from them.
x-e107-labels: &e107-labels
  e107.tests: "1"
  e107.tests.php: ${E107_PHP_VERSION:-}
  e107.tests.db: ${E107_DB_IMAGE:-}
  e107.tests.app-path: ${E107_APP_PATH:-}
  e107.tests.xdebug: ${E107_WITH_XDEBUG:-no}

services:
  db:
    image: ${E107_DB_IMAGE:-mariadb:10.11}
    restart: unless-stopped
    labels: *e107-labels
    environment:
      MYSQL_ROOT_PASSWORD: ${E107_DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${E107_DB_NAME}
      MYSQL_USER: ${E107_DB_USER}
      MYSQL_PASSWORD: ${E107_DB_PASSWORD}
      # MySQL 8+ accepts utf8mb4 fine; e107 sticks with utf8(mb3) historically.
      MYSQL_CHARACTER_SET: ${E107_DB_CHARSET:-utf8mb3}
    # String form so the wrapper can inject flavor-specific args (charset
    # naming and auth plugin differ across mysql/mariadb versions; see
    # db_flavor_args in bin/e107-tests).
    command: >-
      --character-set-server=${E107_DB_CHARSET:-utf8mb3}
      --collation-server=${E107_DB_COLLATION:-utf8mb3_general_ci}
      --max-allowed-packet=64M
      ${E107_DB_EXTRA_ARGS:-}
    healthcheck:
      # mariadb-admin ships with both mariadb and recent mysql images;
      # mysqladmin is the fallback for older mysql tags.
      test:
        - CMD-SHELL
        - >-
          mariadb-admin ping -h 127.0.0.1 -uroot -p"$$MYSQL_ROOT_PASSWORD"
          --silent 2>/dev/null
          || mysqladmin ping -h 127.0.0.1 -uroot -p"$$MYSQL_ROOT_PASSWORD"
          --silent
      interval: 5s
      timeout: 5s
      retries: 30
    tmpfs:
      # Ephemeral DB: faster, and `down` is a clean reset.
      - /var/lib/mysql
    ports:
      # Expose so agents/humans can connect a MySQL client from the host.
      - "127.0.0.1::3306"

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PHP_VERSION: ${E107_PHP_VERSION:-8.2}
        WITH_XDEBUG: ${E107_WITH_XDEBUG:-no}
    image: e107-web:${E107_PHP_VERSION:-8.2}${E107_WITH_XDEBUG_TAG:-}
    restart: unless-stopped
    labels: *e107-labels
    depends_on:
      db:
        condition: service_healthy
    environment:
      E107_DB_HOST: db
      E107_DB_PORT: "3306"
      E107_DB_USER: ${E107_DB_USER}
      E107_DB_PASSWORD: ${E107_DB_PASSWORD}
      E107_DB_NAME: ${E107_DB_NAME}
      # The URL Apache is reachable at, for in-container self-tests.
      E107_INTERNAL_URL: http://web/
    volumes:
      # Bind-mount the app root so host edits are live. Acceptance installs
      # write artifacts here; `e107-tests clean` removes them.
      - ${E107_APP_PATH}:/var/www/html
      # Per-env vendor tree, shadowing the (untouched) worktree vendor dir so
      # every env resolves its own dependencies for its own PHP version.
      - vendor:/var/www/html/e107_tests/vendor
      # Persist composer's download cache across `down`/`up` cycles.
      - composer-cache:/root/.composer/cache
    ports:
      - "127.0.0.1:${E107_WEB_PORT:-0}:80"


volumes:
  vendor:
    labels: *e107-labels
  composer-cache:
    labels: *e107-labels
