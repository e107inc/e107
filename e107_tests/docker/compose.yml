# e107 test harness compose stack: db + web + selenium. Driven by the
# e107_tests/bin/e107-tests wrapper, which sets the project name, the matrix
# env vars, and the bind mount; see e107_tests/docker/README.md. Don't run
# `docker compose` against this file directly.

name: ${COMPOSE_PROJECT_NAME:?set via e107-tests wrapper}

services:
  db:
    image: ${E107_DB_IMAGE:-mariadb:10.11}
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${E107_DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${E107_DB_NAME}
      MYSQL_USER: ${E107_DB_USER}
      MYSQL_PASSWORD: ${E107_DB_PASSWORD}
      # MySQL 8+ accepts utf8mb4 fine; e107 sticks with utf8(mb3) historically.
      MYSQL_CHARACTER_SET: utf8mb3
    command:
      - --character-set-server=utf8mb3
      - --collation-server=utf8mb3_general_ci
      - --max-allowed-packet=64M
    healthcheck:
      # mariadb-admin ships with both mariadb and recent mysql images;
      # mysqladmin is the fallback for older mysql tags.
      test:
        - CMD-SHELL
        - >-
          mariadb-admin ping -h 127.0.0.1 -uroot -p"$$MYSQL_ROOT_PASSWORD"
          --silent 2>/dev/null
          || mysqladmin ping -h 127.0.0.1 -uroot -p"$$MYSQL_ROOT_PASSWORD"
          --silent
      interval: 5s
      timeout: 5s
      retries: 30
    tmpfs:
      # Ephemeral DB: faster, and `down` is a clean reset.
      - /var/lib/mysql
    ports:
      # Expose so agents/humans can connect a MySQL client from the host.
      - "127.0.0.1::3306"

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PHP_VERSION: ${E107_PHP_VERSION:-8.3}
        WITH_XDEBUG: ${E107_WITH_XDEBUG:-no}
    image: e107-web:${E107_PHP_VERSION:-8.3}${E107_WITH_XDEBUG_TAG:-}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      E107_DB_HOST: db
      E107_DB_PORT: "3306"
      E107_DB_USER: ${E107_DB_USER}
      E107_DB_PASSWORD: ${E107_DB_PASSWORD}
      E107_DB_NAME: ${E107_DB_NAME}
      # The URL Apache is reachable at, for in-container self-tests.
      E107_INTERNAL_URL: http://web/
    volumes:
      # Bind-mount the app root so host edits are live. Acceptance installs
      # write artifacts here; `e107-tests clean` removes them.
      - ${E107_APP_PATH}:/var/www/html
      # Persist composer's download cache across `down`/`up` cycles.
      - composer-cache:/root/.composer/cache
    ports:
      - "127.0.0.1:${E107_WEB_PORT:-0}:80"

  # Dedicated browser for the WebDriver suite. The image floats on `latest` so an
  # upstream Chromium change surfaces here; set E107_SELENIUM_IMAGE to pin it.
  selenium:
    image: ${E107_SELENIUM_IMAGE:-docker.io/selenium/standalone-chrome:latest}
    restart: unless-stopped
    # Run as root to dodge a rootless-Podman supervisord EPERM crash-loop.
    user: root
    depends_on:
      - web
    shm_size: 2gb
    healthcheck:
      # check-grid.sh (ships in the image) passes only once the grid accepts
      # sessions, so `up --wait` blocks until the browser is usable.
      test:
        - CMD-SHELL
        - /opt/bin/check-grid.sh --host 0.0.0.0 --port 4444 || exit 1
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 10s

volumes:
  composer-cache:
