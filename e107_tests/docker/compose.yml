# e107 test harness — docker compose stack
#
# Don't invoke `docker compose` against this file directly — use the
# `e107_tests/bin/e107-tests` wrapper, which sets the per-worktree project
# name, exports the matrix env vars, and points the bind mount at the
# worktree's app root.
#
# Required env vars (the wrapper sets all of these):
#   E107_PHP_VERSION   e.g. 8.1 / 8.2 / 8.3 / 8.4
#   E107_DB_IMAGE      e.g. mariadb:10.11 / mysql:8.0
#   E107_APP_PATH      absolute path to the repo root on the host
#   E107_DB_NAME       database name to create
#   E107_DB_USER       app db username
#   E107_DB_PASSWORD   app db password
#   E107_DB_ROOT_PASSWORD  root password for the db service
#   E107_WITH_XDEBUG   "yes" to build/enable Xdebug

name: ${COMPOSE_PROJECT_NAME:?set via e107-tests wrapper}

services:
  db:
    image: ${E107_DB_IMAGE:-mariadb:10.11}
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${E107_DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${E107_DB_NAME}
      MYSQL_USER: ${E107_DB_USER}
      MYSQL_PASSWORD: ${E107_DB_PASSWORD}
      # MySQL 8+ accepts utf8mb4 fine; e107 sticks with utf8(mb3) historically.
      MYSQL_CHARACTER_SET: utf8mb3
    command:
      - --character-set-server=utf8mb3
      - --collation-server=utf8mb3_general_ci
      - --max-allowed-packet=64M
    healthcheck:
      # mariadb-admin ships with both mariadb and recent mysql images;
      # mysqladmin is the fallback for older mysql tags.
      test:
        - CMD-SHELL
        - >-
          mariadb-admin ping -h 127.0.0.1 -uroot -p"$$MYSQL_ROOT_PASSWORD"
          --silent 2>/dev/null
          || mysqladmin ping -h 127.0.0.1 -uroot -p"$$MYSQL_ROOT_PASSWORD"
          --silent
      interval: 5s
      timeout: 5s
      retries: 30
    tmpfs:
      # Tests don't need persistent data; tmpfs is faster and means
      # `down` truly resets to a clean slate without `--volumes` gymnastics.
      - /var/lib/mysql
    ports:
      # Expose so agents/humans can connect a MySQL client from the host.
      - "127.0.0.1::3306"

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PHP_VERSION: ${E107_PHP_VERSION:-8.3}
        WITH_XDEBUG: ${E107_WITH_XDEBUG:-no}
    image: e107-web:${E107_PHP_VERSION:-8.3}${E107_WITH_XDEBUG_TAG:-}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      E107_DB_HOST: db
      E107_DB_PORT: "3306"
      E107_DB_USER: ${E107_DB_USER}
      E107_DB_PASSWORD: ${E107_DB_PASSWORD}
      E107_DB_NAME: ${E107_DB_NAME}
      # Surface the URL Apache is reachable at, so codecept inside the
      # container can self-test by hitting it via the bridge network.
      E107_INTERNAL_URL: http://web/
    volumes:
      # Bind-mount the worktree. Acceptance tests do real e107 installs
      # against this mount, so the worktree will accumulate test artifacts
      # (e107_config.php, e107Install.log, hash dirs under e107_system/
      # and e107_media/, theme copies). Run `e107-tests clean` to wipe
      # them between runs. (Podman :O overlay would isolate these, but
      # docker compose silently strips the flag, so we don't bother.)
      - ${E107_APP_PATH}:/var/www/html
      # Persist composer's download cache so reinstalls between `down`/`up`
      # cycles only re-extract instead of re-downloading.
      - composer-cache:/root/.composer/cache
    ports:
      - "127.0.0.1:${E107_WEB_PORT:-0}:80"

  # Dedicated browser for the WebDriver suite: codecept (in `web`) drives it at
  # `selenium:4444/wd/hub`, and it navigates back to the app at `http://web/`.
  # Pinned to the image CI uses (.github/workflows/test-webdriver.yml).
  selenium:
    image: docker.io/selenium/standalone-chrome:4.21.0-20240517
    restart: unless-stopped
    # supervisord can't write its /var/run control socket as the image's default
    # `seluser` once a rootless-Podman userns remaps ownership (errno.EPERM,
    # crash-loop). Root sidesteps it; under rootless Podman that is just the
    # unprivileged host user.
    user: root
    depends_on:
      - web
    shm_size: 2gb
    healthcheck:
      # check-grid.sh ships in the image and returns 0 only once the node has
      # registered and the grid reports ready, so `up --wait` blocks until the
      # browser can actually accept sessions (no first-run race).
      test:
        - CMD-SHELL
        - /opt/bin/check-grid.sh --host 0.0.0.0 --port 4444 || exit 1
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 10s

volumes:
  composer-cache:
