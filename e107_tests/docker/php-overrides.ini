; e107 test harness — PHP overrides
;
; Loose limits so installs, file uploads, and image tests don't trip
; arbitrary ceilings. Errors are surfaced loudly because this is a
; test environment, never production.

memory_limit = 512M
upload_max_filesize = 64M
post_max_size = 80M
max_execution_time = 300

display_errors = On
display_startup_errors = On
error_reporting = E_ALL & ~E_USER_DEPRECATED
log_errors = On

date.timezone = UTC

allow_url_fopen = On

opcache.enable = 1
opcache.enable_cli = 0
opcache.validate_timestamps = 1
opcache.revalidate_freq = 0
