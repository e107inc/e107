name: Unit Tests

on:
  push:
  pull_request:

env:
  MYSQL_ROOT_PASSWORD: 'Database Password for Continuous Integration'
  CC_TEST_REPORTER_ID: 8948074581c1ffe7f4e47995c65d7d303882310256edd73536723d7c92adb1e3
  PHP_VERSIONS: '5.6 7.0 7.4 8.1 8.2'
  DB_IMAGES: 'mysql:5.5 mysql:8.0 mariadb:10.0 mariadb:10.6 mariadb:10.11'

jobs:
  test-unit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Download Git submodule dependencies
        run: git submodule update --init --recursive --remote

      - name: Create test network
        run: docker network create e107-test

      - name: Launch DB containers
        run: |
          set -eu
          for DB in $DB_IMAGES; do
            DB_TAG=$(echo "$DB" | tr ':.' '--')
            # Per-image overrides:
            #   * mysql:8.x defaults to caching_sha2_password (PHP 5.6/7.0 PDO
            #     can't speak it) and to utf8mb4 (PHP 5.6 PDO rejects with
            #     "Server sent charset unknown to the client") — pin both back.
            #   * Every server gets a generous max_connections so concurrent
            #     cells against the same DB don't trip the default limit (~150).
            EXTRA_ARGS="--max-connections=500"
            case "$DB" in
              mysql:8.*)
                EXTRA_ARGS="$EXTRA_ARGS --default-authentication-plugin=mysql_native_password"
                EXTRA_ARGS="$EXTRA_ARGS --character-set-server=utf8mb3"
                EXTRA_ARGS="$EXTRA_ARGS --collation-server=utf8mb3_general_ci"
                ;;
            esac
            docker run -d --name "db-${DB_TAG}" --network e107-test \
              -e MYSQL_ROOT_PASSWORD="$MYSQL_ROOT_PASSWORD" \
              -e MYSQL_CHARACTER_SET=utf8mb3 \
              "$DB" $EXTRA_ARGS
          done

      - name: Wait for DB containers
        run: |
          set -eu
          for DB in $DB_IMAGES; do
            DB_TAG=$(echo "$DB" | tr ':.' '--')
            for i in $(seq 1 60); do
              if docker exec "db-${DB_TAG}" sh -c "mysqladmin ping -uroot -p\"$MYSQL_ROOT_PASSWORD\" --silent" 2>/dev/null; then
                echo "db-${DB_TAG} is ready."
                break
              fi
              if [ "$i" = "60" ]; then
                echo "Timeout waiting for db-${DB_TAG}"
                docker logs "db-${DB_TAG}" | tail -50
                exit 1
              fi
              sleep 2
            done
          done

      - name: Pre-create per-cell databases
        run: |
          set -eu
          for DB in $DB_IMAGES; do
            DB_TAG=$(echo "$DB" | tr ':.' '--')
            for PHP in $PHP_VERSIONS; do
              PHP_TAG=$(echo "$PHP" | tr '.' '-')
              docker exec "db-${DB_TAG}" sh -c "mysql -uroot -p\"$MYSQL_ROOT_PASSWORD\" -e 'CREATE DATABASE IF NOT EXISTS \`e107_${PHP_TAG}_${DB_TAG}\`;'"
            done
          done

      - name: Prepare per-PHP workspaces
        run: |
          set -eu
          mkdir -p /tmp/ws
          for PHP in $PHP_VERSIONS; do
            PHP_TAG=$(echo "$PHP" | tr '.' '-')
            WS="/tmp/ws/php-${PHP_TAG}"
            cp -a "$GITHUB_WORKSPACE" "$WS"
            cp "$WS/e107_tests/lib/ci/config.unit.ci.yml" "$WS/e107_tests/config.yml"
          done

      - name: Launch PHP containers
        run: |
          set -eu
          for PHP in $PHP_VERSIONS; do
            PHP_TAG=$(echo "$PHP" | tr '.' '-')
            docker run -d --name "php-${PHP_TAG}" --network e107-test \
              -v "/tmp/ws/php-${PHP_TAG}:/app" \
              -w /app \
              "php:${PHP}" \
              tail -f /dev/null
          done

      - name: Provision PHP containers (parallel)
        run: |
          set -eu
          PIDS=""
          mkdir -p /tmp/provision-logs
          for PHP in $PHP_VERSIONS; do
            PHP_TAG=$(echo "$PHP" | tr '.' '-')
            (
              docker exec "php-${PHP_TAG}" sh -c '
                set -eu

                # Refresh apt sources to point at archive.debian.org for archived
                # Debian releases (Stretch/Buster). On modern containers the first
                # apt-get update succeeds and we leave sources alone.
                if ! apt-get update >/dev/null 2>&1; then
                  for FILE in /etc/apt/sources.list /etc/apt/sources.list.d/debian.sources; do
                    [ -f "$FILE" ] || continue
                    sed -i "s#/\(deb\|security\)\.debian\.org/#/archive.debian.org/#g" "$FILE"
                  done
                  if [ -f /etc/apt/sources.list ]; then
                    sed -r -i "/^[^[:space:]#]*[^[:space:]]+[[:space:]]+[^[:space:]]+[[:space:]]+[^#]*-updates/d" /etc/apt/sources.list
                  fi
                  if [ -f /etc/apt/sources.list.d/debian.sources ]; then
                    sed -i -E "/^Suites:/ s/[[:space:]]+[^[:space:]]*-updates//g" /etc/apt/sources.list.d/debian.sources
                  fi
                  echo "Acquire::Check-Valid-Until \"false\";" > /etc/apt/apt.conf.d/99ignore-obsolete
                  echo "Acquire::AllowInsecureRepositories \"true\";" >> /etc/apt/apt.conf.d/99ignore-obsolete
                  echo "APT::Get::AllowUnauthenticated \"true\";" >> /etc/apt/apt.conf.d/99ignore-obsolete
                  apt-get update
                fi

                apt-get install -y --no-install-recommends \
                  curl ca-certificates \
                  libzip-dev libbz2-dev libpng-dev libjpeg-dev libwebp-dev libvpx-dev libicu-dev \
                  zip default-mysql-client

                if php -r "exit(version_compare(PHP_VERSION, \"7.4.0\", \">=\") ? 0 : 1);"; then
                  docker-php-ext-configure gd --with-jpeg --with-webp
                elif php -r "exit(version_compare(PHP_VERSION, \"7.0.0\", \">=\") ? 0 : 1);"; then
                  docker-php-ext-configure gd --with-jpeg-dir=/usr --with-webp-dir=/usr
                else
                  docker-php-ext-configure gd --with-jpeg-dir=/usr --with-vpx-dir=/usr
                fi
                docker-php-ext-install -j "$(nproc)" zip bz2 gd pdo_mysql mysqli intl

                if php -r "exit(version_compare(PHP_VERSION, \"8.0.0\", \">=\") ? 0 : 1);"; then
                  pecl install xdebug
                elif php -r "exit(version_compare(PHP_VERSION, \"7.2.0\", \">=\") ? 0 : 1);"; then
                  pecl install xdebug-3.1.6
                elif php -r "exit(version_compare(PHP_VERSION, \"7.1.0\", \">=\") ? 0 : 1);"; then
                  pecl install xdebug-2.9.8
                elif php -r "exit(version_compare(PHP_VERSION, \"7.0.0\", \">=\") ? 0 : 1);"; then
                  pecl install xdebug-2.7.2
                else
                  pecl install xdebug-2.5.5
                fi
                docker-php-ext-enable xdebug

                curl -sSL https://getcomposer.org/installer \
                  | php -- --install-dir=/usr/local/bin/ --filename=composer
              ' >"/tmp/provision-logs/php-${PHP_TAG}.log" 2>&1
            ) &
            PIDS="$PIDS $!"
          done
          STATUS=0
          for PID in $PIDS; do
            if ! wait "$PID"; then
              STATUS=1
            fi
          done
          if [ "$STATUS" != "0" ]; then
            echo "::error::One or more PHP containers failed to provision"
            for LOG in /tmp/provision-logs/*.log; do
              echo "::group::$(basename "$LOG")"
              cat "$LOG"
              echo "::endgroup::"
            done
            exit 1
          fi

      - name: Install test dependencies
        run: |
          set -eu
          PIDS=""
          mkdir -p /tmp/composer-logs
          for PHP in $PHP_VERSIONS; do
            PHP_TAG=$(echo "$PHP" | tr '.' '-')
            (
              docker exec "php-${PHP_TAG}" sh -c '
                set -eu
                cd /app/e107_tests
                composer update --prefer-dist --no-progress
                php ./vendor/bin/codecept build
              ' >"/tmp/composer-logs/php-${PHP_TAG}.log" 2>&1
            ) &
            PIDS="$PIDS $!"
          done
          STATUS=0
          for PID in $PIDS; do
            if ! wait "$PID"; then
              STATUS=1
            fi
          done
          if [ "$STATUS" != "0" ]; then
            echo "::error::Composer install or codecept build failed"
            for LOG in /tmp/composer-logs/*.log; do
              echo "::group::$(basename "$LOG")"
              cat "$LOG"
              echo "::endgroup::"
            done
            exit 1
          fi

      - name: Run unit tests across all cells
        id: run-tests
        run: |
          set +e
          set -u
          mkdir -p /tmp/cell-outputs /tmp/cell-status
          PIDS=""
          for PHP in $PHP_VERSIONS; do
            PHP_TAG=$(echo "$PHP" | tr '.' '-')
            (
              CELL_PHP_STATUS=0
              for DB in $DB_IMAGES; do
                DB_TAG=$(echo "$DB" | tr ':.' '--')
                CELL="${PHP_TAG}_${DB_TAG}"
                CELL_OUT="/tmp/cell-outputs/${CELL}"
                mkdir -p "$CELL_OUT"

                # Per-cell config.local.yml inside the PHP version's workspace.
                # Cells within the same PHP container run sequentially, so the
                # file is written, consumed, and overwritten in order.
                printf 'db:\n  host: %s\n  dbname: e107_%s\n' \
                  "db-${DB_TAG}" "${CELL}" \
                  > "/tmp/ws/php-${PHP_TAG}/e107_tests/config.local.yml"

                # `-d output_buffering=4096` keeps PHP from flagging headers as
                # already sent when class2.php's bootstrap calls
                # `ini_set('session.*', ...)` after Codeception's `--debug`
                # output. PHPUnit promotes that warning to a test failure under
                # `convertWarningsToExceptions=true`, which sinks every PHP 8.1+
                # cell otherwise.
                docker exec "php-${PHP_TAG}" sh -c "
                  cd /app/e107_tests
                  if php -r 'exit(extension_loaded(\"xdebug\") ? 0 : 1);'; then
                    php -d output_buffering=4096 -d xdebug.mode=coverage ./vendor/bin/codecept run unit \
                      -o 'paths: output: tests/_output/${CELL}' \
                      --steps --debug --coverage --coverage-xml
                  else
                    php -d output_buffering=4096 ./vendor/bin/codecept run unit \
                      -o 'paths: output: tests/_output/${CELL}' \
                      --steps --debug
                  fi
                " >"${CELL_OUT}/codecept.log" 2>&1
                CELL_RC=$?
                echo "$CELL_RC" > "/tmp/cell-status/${CELL}.rc"
                if [ -d "/tmp/ws/php-${PHP_TAG}/e107_tests/tests/_output/${CELL}" ]; then
                  cp -a "/tmp/ws/php-${PHP_TAG}/e107_tests/tests/_output/${CELL}/." "${CELL_OUT}/"
                fi
                if [ "$CELL_RC" != "0" ]; then
                  CELL_PHP_STATUS=1
                fi
              done
              exit "$CELL_PHP_STATUS"
            ) &
            PIDS="$PIDS $!"
          done
          OVERALL=0
          for PID in $PIDS; do
            wait "$PID" || OVERALL=1
          done
          echo "overall=$OVERALL" >> "$GITHUB_OUTPUT"

      - name: Build summary table
        if: always()
        run: |
          set -u
          {
            echo "## Unit test matrix"
            echo ""
            HEADER='| PHP \\ DB'
            SEP='|---'
            for DB in $DB_IMAGES; do
              HEADER="$HEADER | $DB"
              SEP="$SEP|---"
            done
            echo "$HEADER |"
            echo "$SEP|"
            for PHP in $PHP_VERSIONS; do
              PHP_TAG=$(echo "$PHP" | tr '.' '-')
              ROW="| php:${PHP}"
              for DB in $DB_IMAGES; do
                DB_TAG=$(echo "$DB" | tr ':.' '--')
                CELL="${PHP_TAG}_${DB_TAG}"
                if [ -f "/tmp/cell-status/${CELL}.rc" ]; then
                  RC=$(cat "/tmp/cell-status/${CELL}.rc")
                  if [ "$RC" = "0" ]; then
                    ROW="$ROW | :white_check_mark:"
                  else
                    ROW="$ROW | :x: ($RC)"
                  fi
                else
                  ROW="$ROW | :grey_question:"
                fi
              done
              echo "$ROW |"
            done
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload test outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tests_output_${{ github.run_id }}
          path: /tmp/cell-outputs/

      - name: Send code coverage report to Code Climate
        if: always()
        continue-on-error: true
        run: |
          set -eu
          PHP_VERSIONS_DESC=$(printf '%s\n' $PHP_VERSIONS | sort -rV | tr '\n' ' ')
          DB_IMAGES_DESC=$(printf '%s\n' $DB_IMAGES | sort -rV | tr '\n' ' ')
          COV_DIR=""
          for PHP in $PHP_VERSIONS_DESC; do
            PHP_TAG=$(echo "$PHP" | tr '.' '-')
            for DB in $DB_IMAGES_DESC; do
              DB_TAG=$(echo "$DB" | tr ':.' '--')
              CELL="${PHP_TAG}_${DB_TAG}"
              if [ -f "/tmp/cell-outputs/${CELL}/coverage.xml" ]; then
                COV_DIR="/tmp/cell-outputs/${CELL}"
                echo "Using coverage from ${CELL}"
                break 2
              fi
            done
          done
          if [ -z "$COV_DIR" ]; then
            echo "No cell produced coverage.xml; skipping upload."
            exit 0
          fi
          curl -sSL -o /tmp/cc-test-reporter \
            https://codeclimate.com/downloads/test-reporter/test-reporter-latest-linux-amd64
          chmod +x /tmp/cc-test-reporter
          /tmp/cc-test-reporter before-build || true
          /tmp/cc-test-reporter format-coverage \
            --input-type clover \
            --output "${COV_DIR}/codeclimate.json" \
            "${COV_DIR}/coverage.xml"
          /tmp/cc-test-reporter upload-coverage \
            --input "${COV_DIR}/codeclimate.json"

      - name: Fail if any cell failed
        if: steps.run-tests.outputs.overall != '0'
        run: |
          echo "::error::At least one PHP×DB cell failed; see the summary table above."
          exit 1
