name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        For bigger ideas or proposals that need discussion before implementation, consider opening a [Discussion in Ideas](https://github.com/e107inc/e107/discussions/categories/ideas) first.
  - type: textarea
    id: motivation
    attributes:
      label: Problem or motivation
      description: What problem does this solve? Why is it needed?
      placeholder: "When I try to …, I can't because …"
    validations:
      required: true
  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed solution
      description: What should the feature do? Be as specific as you can.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you consider, and why are they insufficient?
    validations:
      required: false
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Anything else — mockups, links to similar features in other systems, related issues.
