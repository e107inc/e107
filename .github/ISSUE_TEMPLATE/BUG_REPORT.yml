name: Bug Report
description: Something isn't working the way it should
title: "[Bug]: "
labels: []
body:
  - type: input
    id: e107version
    attributes:
      label: e107 version
      description: "Which version of e107 are you seeing this on? Found in Admin Area > About, or check the Git tag/branch."
      placeholder: "e.g. v2.3.4, or master (commit abc1234)"
    validations:
      required: true
  - type: input
    id: php-version
    attributes:
      label: PHP version
      description: "Found in Admin Area > About > PHP Info, or run: php -v"
      placeholder: "e.g. 5.6.40"
    validations:
      required: true
  - type: textarea
    id: bug-description
    attributes:
      label: What happened?
      description: A clear description of what the bug is. Screenshots welcome.
    validations:
      required: true
  - type: textarea
    id: how-to-reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
      placeholder: |
        1. Go to …
        2. Click on …
        3. See error …
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Anything else – error messages, log output, server details, screenshots.
